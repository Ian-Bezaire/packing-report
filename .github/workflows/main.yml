name: Build macOS App

on:
  # Run the build whenever changes are pushed to the default branch.
  push:
    branches:
      - main
  # Allow manual runs of the workflow from the GitHub UI.
  workflow_dispatch:

jobs:
  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app with PyInstaller
        run: |
          pyinstaller --windowed --onefile -n LakeMichiganOrderManager order_manager.py

      - name: Archive macOS app
        run: |
          # Zip the .app bundle for easy distribution.  The `ditto` command
          # preserves the resource forks and metadata required for macOS apps.
          cd dist
          ditto -c -k LakeMichiganOrderManager.app ../LakeMichiganOrderManager-mac.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: LakeMichiganOrderManager-mac
          path: LakeMichiganOrderManager-mac.zip
