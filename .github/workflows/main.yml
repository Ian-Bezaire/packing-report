name: Build Mac App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: apple-silicon
            runner: macos-15
            artifact_name: LakeMichiganOrderManager-mac-apple-silicon
          - name: intel
            runner: macos-15-intel
            artifact_name: LakeMichiganOrderManager-mac-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          pyinstaller --windowed --name "LakeMichiganOrderManager" order_manager.py

      - name: Zip app bundle
        run: |
          cd dist
          ditto -c -k --keepParent "LakeMichiganOrderManager.app" "../${{ matrix.artifact_name }}.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
